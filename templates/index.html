<!doctype html>
<html>
    <head>
        <title>Lead Finder</title>

        <link rel="stylesheet" href="/static/style.css" />

        <style>
            #loading {
                display: none;
                text-align: center;
                margin-top: 30px;
            }

            .spinner {
                border: 6px solid #eee;
                border-top: 6px solid #3498db;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                animation: spin 1s linear infinite;
                margin: auto;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h1>Lead Finder Dashboard</h1>

            <form id="searchForm">
                <div class="search-panel">
                    <input
                        name="type"
                        placeholder="Business type (bar, club, gym)"
                        required
                    />

                    <input
                        name="region"
                        placeholder="Region (Delhi, Mumbai)"
                        required
                    />
                    <select name="limit" id="limit">
                        <option value="40">40 Leads</option>
                        <option value="80">80 Leads</option>
                        <option value="120">120 Leads</option>
                    </select>
                    <button type="submit">Search</button>
                </div>
            </form>

            <div id="loading">
                <h3>Extracting leads... please wait</h3>

                <div class="spinner"></div>
            </div>

            <div id="results">
                <div class="stats">
                    <div class="card">
                        <h3>Total Leads</h3>
                        <p id="total">0</p>
                    </div>

                    <div class="card">
                        <h3>Website Down</h3>
                        <p id="down">0</p>
                    </div>

                    <div class="card">
                        <h3>No Website</h3>
                        <p id="none">0</p>
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Website</th>
                            <th>Status</th>
                            <th>Reviews</th>
                            <th>Loading Speed</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <script>
            document
                .getElementById("searchForm")
                .addEventListener("submit", async function (e) {
                    e.preventDefault();

                    let type = document.querySelector("[name='type']").value;
                    let region =
                        document.querySelector("[name='region']").value;
                    let limit = document.getElementById("limit").value;
                    document.getElementById("loading").style.display = "block";

                    let response = await fetch("/extract", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            type: type,
                            region: region,
                            limit:limit,
                        }),
                    });

                    let leads = await response.json();

                    document.getElementById("loading").style.display = "none";

                    let table = document.getElementById("tableBody");

                    table.innerHTML = "";

                    let down = 0;
                    let none = 0;

                    leads.forEach((l) => {
                        if (l.status == "down") down++;
                        if (l.status == "none") none++;

                        let website = l.website
                            ? `<a href="${l.website}" target="_blank">Visit</a>`
                            : "None";

                        table.innerHTML += `

<tr>

<td>${l.name}</td>

<td>${l.phone}</td>

<td>${website}</td>

<td class="status-${l.status}">${l.status}</td>

<td>${l.reviews}</td
>
<td>${l.speed ?? "N/A"}</td>
</tr>

`;
                    });

                    document.getElementById("total").innerText = leads.length;
                    document.getElementById("down").innerText = down;
                    document.getElementById("none").innerText = none;
                });
        </script>
    </body>
</html>
