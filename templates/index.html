<!doctype html>
<html>
    <head>
        <title>Lead Finder</title>

        <link rel="stylesheet" href="/static/style.css" />
    </head>

    <body>
        <div class="layout">

            <!-- SIDEBAR -->
            <aside class="sidebar">
                <div class="sidebar-top">
                    <img src="/static/logo.png" class="logo-img" />
                    <span class="brand">LeadFinder</span>
                </div>

                <nav class="sidebar-nav">
                    <a href="/dashboard" class="active">Dashboard</a>
                    <a href="/leads">Leads</a>
                    <a href="/logout">Logout</a>
                </nav>
            </aside>

            <!-- MAIN CONTENT -->
            <div class="main">
                <!-- keep your navbar (only right side stuff now) -->
                <nav class="navbar">
                    <div></div>

                    <div class="nav-right">
                        <button class="nav-btn">Upgrade</button>
                        <div class="profile"><span>K</span></div>
                    </div>
                </nav>

                <!-- your existing container -->
                <div class="container">

            <form id="searchForm">
                <div class="search-panel">
                    <input
                        name="type"
                        placeholder="Business type (bar, club, gym)"
                        required
                    />

                    <input
                        name="region"
                        placeholder="Region (Delhi, Mumbai)"
                        required
                    />
                    <select name="limit" id="limit">
                        <option value="5">5 Leads</option>
                        <option value="20">20 Leads</option>
                        <option value="40">40 Leads</option>
                        <option value="80">80 Leads</option>
                        <option value="120">120 Leads</option>
                    </select>
                    <button type="submit">Search</button>
                </div>
            </form>

            <div id="results">
                <div class="stats">
                    <div class="card">
                        <h3>Total Leads</h3>
                        <p id="total">0</p>
                    </div>

                    <div class="card">
                        <h3>Website Down</h3>
                        <p id="down">0</p>
                    </div>

                    <div class="card">
                        <h3>No Website</h3>
                        <p id="none">0</p>
                    </div>
                </div>

                <!-- 🔥 ADD THIS WRAPPER -->
                <div class="table-wrapper">

                    <!-- 🔥 BUTTON GOES HERE -->


                    <table>
                        <thead>
                            <tr>
                                <th>Select</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Emails</th>
                                <th>Website</th>
                                <th>Status</th>
                                <th>Reviews</th>
                                <th>Loading Speed</th>
                                <th>Socials</th>
                                <th>Address</th>
                                <th>Score</th>
                                <th>Tags</th>
                                <th>AI Insight</th>
                                <th style="text-align:right;">
                                        <button id="saveLeads" disabled>💾 Save</button>
                                    </th>
                            </tr>
                        </thead>

                        <tbody id="tableBody"></tbody>
                    </table>

                    <!-- ✅ BUTTON AT BOTTOM -->


                </div>
            </div>

        </div>
        <div id="loadingOverlay">
            <div class="loading-box">
                <div class="spinner"></div>
                <p id="loadingText">Extracting leads...</p>

                <!-- Progress Bar -->
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <p id="progressPercent">0%</p>
            </div>
        </div>
        <script src="/static/main.js"></script>

    </body>
</html>
